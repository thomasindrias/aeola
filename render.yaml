services:
  - type: web
    name: aeola
    runtime: docker
    repo: https://github.com/thomasindrias/aeola.git
    branch: main
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: API_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_PAYMENT_LINK
        value: https://buy.stripe.com/aFa9AM0EBh2N9ZPf2f3Nm00
      - key: DB_PATH
        value: /data/aeola.db
      - key: PORT
        value: "8000"
      - key: CONCURRENCY
        value: "3"
      - key: RATE_LIMIT
        value: "5"
      - key: LOG_LEVEL
        value: info
    disk:
      name: aeola-data
      mountPath: /data
      sizeGB: 1
